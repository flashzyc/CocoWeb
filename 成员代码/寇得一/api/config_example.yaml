# API 配置示例
# 复制此文件到 config/config.yaml 并填入你的 API 密钥

# OpenAI API 配置
openai:
  api_key: "This is a placeholder for the API key"
  model: "gpt-4"  # 可选: gpt-4, gpt-4-turbo, gpt-3.5-turbo
  temperature: 0.7
  max_tokens: 2000
  base_url: null  # 可选: 自定义 API 端点（如使用代理）

# 如需使用其他 API 提供商，可以添加：
# 
# claude:
#   api_key: "your-claude-api-key"
#   model: "claude-3-opus-20240229"
# 
# local:
#   base_url: "http://localhost:11434/v1"
#   api_key: "ollama"  # 本地模型可能不需要真实密钥
#   model: "llama2"

