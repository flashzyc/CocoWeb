# 风险分级策略配置

risk_levels:
  low:
    - fs.list
    - fs.search
    - web.snapshot
    - web.extract
    - notes.search
  medium:
    - fs.move
    - fs.rename
    - fs.copy
    - web.open
    - web.click
    - web.type
    - notes.create
    - notes.append
    - wx.open_chat
    - wx.paste_text
  high:
    - fs.trash
    - web.submit
    - web.download
    - exec.command

# 确认策略
confirmation_strategy:
  low: "auto_allow_after_first"  # 首次询问后自动允许
  medium: "always_prompt"        # 每次必须弹窗确认
  high: "double_confirm"         # 二次确认 + 确认词

# 高风险操作的确认词
high_risk_confirm_word: "CONFIRM"

# 自动允许的低风险操作（首次会话后）
auto_allow_low_risk: false  # 是否启用自动允许（需用户首次确认）
