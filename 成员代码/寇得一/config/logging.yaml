# 日志系统配置

# 全局日志级别: DEBUG, INFO, WARNING, ERROR, CRITICAL
level: INFO

# 日志目录
logs_dir: logs

# 输出配置
console: true   # 是否输出到控制台
file: true      # 是否输出到文件

# 日志轮转配置
rotation:
  max_bytes: 10485760    # 单个日志文件最大大小（10MB）
  backup_count: 5        # 保留的备份文件数量

# 各模块的日志级别
modules:
  app: INFO      # 应用主模块
  tools: INFO    # 工具模块
  api: DEBUG     # API 调用模块
  orchestrator: INFO
  executor: INFO

# 审计日志配置
audit:
  enabled: true
  format: jsonl  # jsonl 或 json
  retention_days: 30  # 保留天数（0 表示永久保留）

# 性能日志
performance:
  enabled: true
  log_slow_operations: true
  slow_threshold_seconds: 1.0  # 慢操作阈值（秒）
