<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <style>
        :root {
            --bg: #f5f1e8;
            --paper: #fffdf8;
            --ink: #17212b;
            --muted: #4f5b66;
            --accent: #005b56;
            --accent-soft: #d8ece9;
            --line: #d8d2c4;
            --shadow: 0 14px 34px rgba(23, 33, 43, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            max-width: 100%;
            overflow-x: hidden;
        }

        body {
            margin: 0;
            color: var(--ink);
            background:
                radial-gradient(1200px 500px at -10% -20%, #efe3cd 0, transparent 60%),
                radial-gradient(1200px 600px at 120% 0%, #dbe9e7 0, transparent 65%),
                var(--bg);
            font-family: "Noto Serif SC", "Source Han Serif SC", "STFangsong", serif;
            line-height: 1.68;
        }

        .layout {
            width: min(920px, 92vw);
            margin: 18px auto 26px;
        }

        .hero {
            border-radius: 14px;
            background: linear-gradient(125deg, #f8f3e8 0%, #f3faf9 100%);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            padding: 16px 18px;
            position: relative;
            overflow: hidden;
        }

        .hero::after {
            content: "";
            position: absolute;
            right: -42px;
            top: -54px;
            width: 170px;
            height: 170px;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(0, 91, 86, 0.22), rgba(0, 91, 86, 0.02));
        }

        h1 {
            margin: 0;
            font-family: "Noto Sans SC", "Source Han Sans SC", "Microsoft YaHei", sans-serif;
            font-size: clamp(1.25rem, 1.9vw, 1.75rem);
            line-height: 1.38;
            letter-spacing: 0.02em;
        }

        .subtitle {
            margin-top: 7px;
            color: var(--muted);
            font-family: "Noto Sans SC", "Source Han Sans SC", "Microsoft YaHei", sans-serif;
            overflow-wrap: anywhere;
        }

        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin-top: 12px;
        }

        .chip {
            font-family: "Noto Sans SC", "Source Han Sans SC", "Microsoft YaHei", sans-serif;
            font-size: 0.85rem;
            color: var(--accent);
            background: var(--accent-soft);
            border: 1px solid rgba(0, 91, 86, 0.2);
            border-radius: 999px;
            padding: 5px 10px;
            overflow-wrap: anywhere;
        }

        .cards {
            margin-top: 12px;
            display: block;
        }

        .cards > .card + .card {
            margin-top: 12px;
        }

        .card {
            border-radius: 12px;
            background: var(--paper);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            padding: 15px 16px;
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 8px;
            font-family: "Noto Sans SC", "Source Han Sans SC", "Microsoft YaHei", sans-serif;
            color: var(--accent);
            font-size: 1.02rem;
            letter-spacing: 0.01em;
        }

        .content h2 {
            margin-top: 0.9em;
            margin-bottom: 0.35em;
            font-family: "Noto Sans SC", "Source Han Sans SC", "Microsoft YaHei", sans-serif;
            color: #1b4440;
            font-size: 0.97rem;
        }

        .content h3 {
            margin-top: 0.8em;
            margin-bottom: 0.3em;
            font-family: "Noto Sans SC", "Source Han Sans SC", "Microsoft YaHei", sans-serif;
            color: #365c59;
            font-size: 0.92rem;
        }

        .content p {
            margin: 0.42em 0;
            text-indent: 2em;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .content blockquote {
            margin: 0.6em 0;
            border-left: 4px solid #77a39b;
            background: #eef7f5;
            padding: 8px 10px;
            border-radius: 6px;
        }

        .content blockquote p {
            margin: 0;
            text-indent: 0;
            color: #274644;
        }

        .content code {
            font-family: "Cascadia Code", "Consolas", monospace;
            background: #f0ede5;
            border-radius: 5px;
            padding: 1px 5px;
            overflow-wrap: anywhere;
            word-break: break-word;
            white-space: normal;
        }

        @media (max-width: 768px) {
            .layout {
                width: min(96vw, 1120px);
                margin-top: 14px;
            }

            .hero,
            .card {
                padding: 16px;
                border-radius: 12px;
            }

            .chip {
                font-size: 0.82rem;
            }
        }
    </style>
</head>
<body>
    <main class="layout">
        <header class="hero">
            <h1>{{ title }}</h1>
            <div class="subtitle">{{ subtitle }}</div>
            <div class="meta">
                <span class="chip">分析方向：{{ analysis_label }}</span>
                <span class="chip">仓库：{{ repo_full_name }}</span>
                <span class="chip">生成时间：{{ generated_at }}</span>
                <span class="chip">模型：{{ model_name }}</span>
            </div>
        </header>

        <section class="cards">
            <article class="card content">
                <h2>项目技术名片</h2>
                {{ project_profile_html | safe }}
            </article>

            <article class="card content">
                <h2>分析正文</h2>
                {{ body_html | safe }}
            </article>
        </section>
    </main>
</body>
</html>
